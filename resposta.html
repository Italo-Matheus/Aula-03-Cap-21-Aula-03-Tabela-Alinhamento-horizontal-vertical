<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito - Alinhamento em Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }
        td{
            border: 1px solid black ;
            padding: 8px;
            text-align: center;
            vertical-align:middle;
            
        }
        .numero{
            text-align: right;

        }
        .diminui{
            height: 50px;
        }

        .esquerda{
            text-align: left;
        }
        .topo{
            vertical-align: top;
        }
        .baixo{
            vertical-align:bottom;
            text-align: right;
        }
        .dois{
            vertical-align: top;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>Gabarito - Trabalhando com alinhamento</h1>
    <table>
        <tr class="diminui">
            <td class="esquerda">A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>

        <tr>
            <td class="dois">A2</td>
            <td>B2</td>
            <td class="baixo">C2</td>
            
        </tr>

        <tr>
            <td  class="topo">A3</td>
            <td>B3</td>
            <td>10</td>
            
        </tr>

        <tr class="diminui">
            <td class="esquerda">A4</td>
            <td>B4</td>
            <td>C4</td>
        </tr>
    </table>

</body>
</html>
